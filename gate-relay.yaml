esphome:
  name: gate-relay
  friendly_name: Gate relay

esp8266:
  board: esp07

# Enable logging
logger:

# Enable Home Assistant API
api:

ota:
  - platform: esphome
    

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  min_auth_mode: WPA2
  

  # Enable fallback hotspot (captive portal) in case wifi connection fails
  ap:
    ssid: "Esphome-Web-C5946F"

web_server:
  version: 3
  port: 80
  ota: false
  auth:
    username: user
    password: ******
 

captive_portal:
    
switch:
  - platform: gpio
    name: "Открыть-закрыть ворота"
    pin: GPIO4
    id: relay
    restore_mode: ALWAYS_OFF
    on_turn_on:
      - delay: 1s
      - switch.turn_off: relay

button:
  - platform: restart
    name: "Перезагрузка реле ворот"

binary_sensor:
  - platform: gpio
    id: sensor_1
    name: "Closed"
    pin:
      number: GPIO12
      mode:
        input: true
        pullup: true
      inverted: False
    on_press:
      then:
        lambda: |-
          id(gate_status).publish_state("Закрыты");
    on_release:
      then:
        lambda: |-
          id(gate_status).publish_state("Приоткрыты");

  - platform: gpio
    id: sensor_2
    name: "Open"
    pin:
      number: GPIO13
      mode:
        input: true
        pullup: true
      inverted: False
    on_press:
      then:
        lambda: |-
          id(gate_status).publish_state("Открыты");
    on_release:
      then:
        lambda: |-
          id(gate_status).publish_state("Приоткрыты");

sensor:
  - platform: wifi_signal
    name: "WI-FI RSSI"
    id: rssi
    update_interval: 20s

  - platform: uptime
    type: seconds
    name: Uptime Sensor

text_sensor:
  - platform: template
    name: "Состояние ворот"
    id: gate_status
    #update_interval: 250ms



